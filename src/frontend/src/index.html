<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Economía doméstica — Acceder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F7F6F2;
      --surface:   #FFFFFF;
      --border:    #E2E0D8;
      --text:      #1A1A18;
      --muted:     #6B6A64;
      --accent:    #2A6B4F;
      --accent-h:  #1E5039;
      --danger:    #B83B3B;
      --radius:    10px;
      --shadow:    0 2px 12px rgba(0,0,0,0.07);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #141412;
        --surface: #1E1E1B;
        --border:  #2E2E2A;
        --text:    #F0EFE9;
        --muted:   #8A8980;
        --accent:  #3D9970;
        --accent-h:#2E7A57;
      }
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      padding: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 380px;
      padding: 2.5rem 2rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .logo-text {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -.01em;
      line-height: 1.2;
    }

    .logo-sub {
      font-size: .75rem;
      color: var(--muted);
      font-weight: 400;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -.02em;
      margin-bottom: .4rem;
    }

    .subtitle {
      font-size: .875rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: .8125rem;
      font-weight: 500;
      margin-bottom: .35rem;
      color: var(--text);
    }

    input {
      width: 100%;
      padding: .65rem .85rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font-size: .9375rem;
      font-family: inherit;
      transition: border-color .15s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(42,107,79,.12);
    }

    input::placeholder { color: var(--muted); opacity: .6; }

    .btn {
      width: 100%;
      padding: .75rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: .9375rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      margin-top: .5rem;
      transition: background .15s, opacity .15s;
    }

    .btn:hover  { background: var(--accent-h); }
    .btn:active { opacity: .85; }

    .btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .error {
      display: none;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: var(--danger);
      font-size: .8125rem;
      padding: .6rem .85rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
    }

    @media (prefers-color-scheme: dark) {
      .error { background: #2D1515; border-color: #5C2626; }
    }

    .error.visible { display: block; }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">

    <div class="logo">
      <div class="logo-icon">
        <!-- icono casa -->
        <svg viewBox="0 0 24 24">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">Casa</div>
        <div class="logo-sub">Economía doméstica</div>
      </div>
    </div>

    <h1>Acceder</h1>
    <p class="subtitle">Introduce tus datos para entrar.</p>

    <div class="error" id="error-msg"></div>

    <div class="field">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        placeholder="tu@email.com"
        autocomplete="email"
        autofocus
      >
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <input
        type="password"
        id="password"
        placeholder="••••••••"
        autocomplete="current-password"
      >
    </div>

    <button class="btn" id="btn-login" onclick="login()">
      <span id="btn-text">Entrar</span>
      <div class="spinner" id="spinner"></div>
    </button>

  </div>

  <script>
    const API = '/api';

    // Si ya hay token válido redirige directo al dashboard
    if (localStorage.getItem('token')) {
      window.location.href = '/dashboard.html';
    }

    // Permite hacer login pulsando Enter
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl  = document.getElementById('error-msg');
      const btn      = document.getElementById('btn-login');
      const spinner  = document.getElementById('spinner');
      const btnText  = document.getElementById('btn-text');

      // Validación básica
      if (!email || !password) {
        mostrarError('Introduce tu email y contraseña.');
        return;
      }

      // Estado de carga
      btn.disabled  = true;
      btnText.style.display  = 'none';
      spinner.style.display  = 'block';
      errorEl.classList.remove('visible');

      try {
        const body = new URLSearchParams({ username: email, password });

        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body,
        });

        const data = await res.json();

        if (!res.ok) {
          mostrarError(data.detail || 'Email o contraseña incorrectos.');
          return;
        }

        // Guardar token y datos del usuario
        localStorage.setItem('token',    data.access_token);
        localStorage.setItem('user_id',  data.user_id);
        localStorage.setItem('nombre',   data.nombre);

        window.location.href = '/dashboard.html';

      } catch (err) {
        mostrarError('No se pudo conectar con el servidor. Comprueba tu red.');
      } finally {
        btn.disabled          = false;
        btnText.style.display = 'block';
        spinner.style.display = 'none';
      }
    }

    function mostrarError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('visible');
    }
  </script>
</body>
</html>
